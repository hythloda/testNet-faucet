<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TestNet Faucet Request</title>

<style>
html,
body {
  margin: 0;
  min-height: 100%;
  background: #120726;
}

.canton-wrap {
  max-width: 700px;
  margin: 40px auto;
  padding: 40px;
  background: #120726;
  color: white;
  border-radius: 24px;
  font-family: Arial, sans-serif;
}

    h1 {
      margin: 0 0 16px;
      font-size: 42px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 32px;
      color: rgba(255,255,255,0.78);
      font-size: 18px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 0 0 10px;
      font-weight: 700;
      font-size: 16px;
    }

    input,
    textarea,
    button {
      width: 100%;
      margin: 0 0 22px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #7b5cff;
      background: #0d0820;
      color: white;
      box-sizing: border-box;
      font-size: 16px;
    }

    input {
      min-height: 58px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button {
      background: #f2ff8d;
      color: #170626;
      font-weight: 800;
      cursor: pointer;
      border: none;
      font-size: 18px;
    }

    button:hover {
      opacity: 0.9;
    }

    #thank-you-message {
      display: none;
      padding: 18px;
      border-radius: 12px;
      background: #241044;
      border: 1px solid #7b5cff;
      color: white;
    }

    @media (max-width: 700px) {
      body {
        align-items: flex-start;
        padding: 20px;
      }

      .canton-wrap {
        padding: 28px;
        border-radius: 18px;
      }

      h1 {
        font-size: 30px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="canton-wrap">
    <iframe name="hidden_submit_frame" style="display:none;"></iframe>

    <div id="form-shell">
      <h1>TestNet Faucet Request</h1>
      <p>Request Canton Coin for TestNet testing. Please include the PartyID that should receive the funds and a short description of your intended usage.</p>

      <form
        id="testnet-faucet-form"
        action="https://script.google.com/macros/s/AKfycbz-F0DfbDvnaK5s3gqgi6p3AM-QoEUVmSueJRFmi6GP99rU1iI_TGJr5rxDUgDsrr__/exec"
        method="post"
        target="hidden_submit_frame"
        onsubmit="if (!this.checkValidity()) return true; document.getElementById('form-shell').style.display='none'; document.getElementById('thank-you-message').style.display='block'; window.scrollTo({top:0,behavior:'smooth'}); return true;"
      >
        <label for="cc_amount">CC Amount *</label>
        <input type="number" id="cc_amount" name="CC Amount" min="1" step="1" required>

        <label for="party_id">PartyID *</label>
        <input type="text" id="party_id" name="PartyID" required>

        <label for="usage">Usage *</label>
        <textarea id="usage" name="Usage" required></textarea>

        <button type="submit">Submit Request</button>
      </form>
    </div>

    <div id="thank-you-message">
      Thank you. Your TestNet faucet request has been submitted.
    </div>
  </main>
</body>
</html>
